models:
  - name: dim_listings_cleansed
    columns:
     - name: host_id
       data_tests:
               field: host_id

     - name: room_type
       data_tests:
         - accepted_values:
             arguments:
               values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']	
    
     - name: minimum_nights
       data_tests:
         - positive_values
  - name:dim_hosts_cleansed    
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        data_type: integer
      - name: host_name
        data_type: string
      - name: is_superhost
        data_type: string
      - name: updated_at
        data_type: timestamp
      - name: created_at
        data_type: timestamp